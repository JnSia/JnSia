<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>후기 작성</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script
      src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"
    ></script>

    <script src="./resource/summernote/summernote-lite.min.js"></script>
    <script src="./resource/summernote/lang/summernote-ko-KR.js"></script>
    <link
      rel="stylesheet"
      href="./resource/summernote/summernote-lite.min.css"
    />
  </head>
  <body>
    <div
      style="
        margin: 50px auto;
        margin-top: 100px;
        padding: 0;
        width: 80vw;
        max-width: 1280px;
        height: 10px;
      "
    >
      <button type="button" class="btn btn-outline-dark" onclick="movepage()">
        후기 글 보러가기
      </button>
    </div>
    <div style="margin: 0 auto; padding: 0; width: 80vw; max-width: 1280px">
      <form method="post">
        <div class="mb-3">
          <input
            type="email"
            class="form-control"
            id="exampleFormControlInput1"
            placeholder="제목을 입력해주세요."
          />
        </div>
        <textarea name="content" id="summernote"></textarea>
      </form>
      <br />
      <div class="d-grid justify-content-md-end">
        <button
          type="button"
          class="btn btn-outline-warning"
          onclick="location.href='./review.html'"
        >
          후기 등록
        </button>
        <button
          type="button"
          class="btn btn-outline-danger"
          onclick="location.href='./error.html'"
        >
          임시 에러
        </button>
      </div>
    </div>
    <script>
      $(document).ready(() => {
        $('#summernote').summernote({
          placeholder: '예쁜 후기 작성해주세요!',
          tabsize: 2,
          height: 500,
          minHeight: null,
          maxHeight: null,
          focus: true,
          lang: 'ko-KR',
          toolbar: [
            ['fontname', ['fontname']],
            ['fontsize', ['fontsize']],
            [
              'style',
              ['bold', 'italic', 'underline', 'strikethrough', 'clear'],
            ],
            ['color', ['forecolor', 'color']],
            ['table', ['table']],
            ['para', ['ul', 'ol', 'paragraph']],
            ['height', ['height']],
            ['insert', ['picture', 'link', 'video']],
            ['view', ['fullscreen', 'help']],
          ],
          fontNames: [
            'Arial',
            'Arial Black',
            'Comic Sans MS',
            'Courier New',
            '맑은 고딕',
            '궁서',
            '굴림체',
            '굴림',
            '돋움체',
            '바탕체',
          ],
          fontSizes: [
            '8',
            '9',
            '10',
            '11',
            '12',
            '14',
            '16',
            '18',
            '20',
            '22',
            '24',
            '28',
            '30',
            '36',
            '50',
            '72',
          ],
        });
      });
    </script>
    <script>
      function movepage() {
        location.href = '/review2';
      }
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
