<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>후기</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT"
      crossorigin="anonymous"
    />
    <style>
      main {
        margin: 0 auto;
        padding: 0;
      }
      input {
        height: 1.8em;
        width: 220px;
        outline: none;
        padding: 0 10px;
        /* box-shadow: 3px 3px 10px #566270; */
        border: none;
      }

      ::placeholder {
        color: lightgray;
      }

      #recommend {
        margin-top: 1px;
        background: white;
        padding: 0 10px;
      }

      .item {
        height: 1.8em;
        width: 220px;
        outline: none;
      }

      .item:hover {
        color: #9baec8;
      }
      .text {
        font-weight: bold;
      }
      .invisible {
        display: none;
      }
    </style>
  </head>
  <body>
    <main style="width: 80vw; max-width: 1280px">
      <div style="height: 200px">
        <button
          class="btn btn-outline-dark"
          onclick="location.href='./Main.html'"
        >
          히히
        </button>
      </div>
      <div style="display: flex; justify-content: space-around">
        <button
          type="button"
          class="btn btn-outline-dark"
          onclick="location.href='./review.html'"
        >
          리스트
        </button>
        <button
          type="button"
          class="btn btn-outline-dark"
          onclick="location.href='./review2.html'"
        >
          카드
        </button>
        <input
          type="text"
          placeholder="Digging Your Happy!"
          style="width: 40vw; border: 1px solid black"
        />
        <div id="recommend" class="invisible">
          <div class="item"><span class="text"></span></div>
          <div class="item">어디로 모여?<span class="text"></span></div>
          <div class="item">글로모여 <span class="text"></span> writenow</div>
        </div>
        <button
          type="button"
          class="btn btn-outline-dark"
          onclick="location.href='./writeReview.html'"
        >
          후기 등록
        </button>
      </div>
      <br />
      <div class="tabel-responsive">
        <table class="table table-hover">
          <thead class="text-sm-center fs-6">
            <tr>
              <th scope="col">번호</th>
              <th scope="col">지역</th>
              <th scope="col">제목</th>
              <th scope="col">글쓴이</th>
              <th scope="col">작성일</th>
              <th scope="col">조회수</th>
              <th scope="col">추천수</th>
            </tr>
          </thead>
          <tbody class="table-group-divider fs-6 text-sm-center">
            <tr onclick="location.href=`./review5`">
              <th scope="row">5</th>
              <td>미국 캘리포니아</td>
              <td>제목5</td>
              <td>어느 날 우리</td>
              <td>22.09.14</td>
              <td>14</td>
              <td>9</td>
            </tr>
            <tr>
              <th scope="row">4</th>
              <td>제주 서귀포</td>
              <td>제목4</td>
              <td>출판모여</td>
              <td>22.09.14</td>
              <td>58</td>
              <td>2</td>
            </tr>
            <tr>
              <th scope="row">3</th>
              <td>대구 북구</td>
              <td>제목을 길게 쓰면 저 칸이 늘어날까요?</td>
              <td>글로모여</td>
              <td>22.09.13</td>
              <td>98</td>
              <td>18</td>
            </tr>
            <tr>
              <th scope="row">2</th>
              <td>경북 구미</td>
              <td>제목2</td>
              <td>파란눈사람</td>
              <td>22.09.13</td>
              <td>19</td>
              <td>6</td>
            </tr>
            <tr>
              <th scope="row">1</th>
              <td>경남 창원</td>
              <td>제목1</td>
              <td>술이다비다</td>
              <td>22.09.13</td>
              <td>39</td>
              <td>9</td>
            </tr>
          </tbody>
        </table>
      </div>
      <br />
      <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
          <li class="page-item">
            <a class="page-link" href="#" aria-label="Previous">
              <span aria-hidden="true">&laquo;</span>
            </a>
          </li>
          <li class="page-item"><a class="page-link" href="#">1</a></li>
          <li class="page-item"><a class="page-link" href="#">2</a></li>
          <li class="page-item"><a class="page-link" href="#">3</a></li>
          <li class="page-item"><a class="page-link" href="#">4</a></li>
          <li class="page-item"><a class="page-link" href="#">5</a></li>
          <li class="page-item">
            <a class="page-link" href="#" aria-label="Next">
              <span aria-hidden="true">&raquo;</span>
            </a>
          </li>
        </ul>
      </nav>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8"
      crossorigin="anonymous"
    ></script>
    <script>
      const inputBox = document.querySelector('input');
      const recommendBox = document.querySelector('#recommend');
      const texts = document.querySelectorAll('.text');

      inputBox.addEventListener('keyup', (e) => {
        if (e.target.value.length > 0) {
          recommendBox.classList.remove('invisible');
          texts.forEach((textEl) => {
            textEl.textContent = e.target.value;
          });
        } else {
          recommendBox.classList.add('invisible');
        }
      });
    </script>
  </body>
</html>
